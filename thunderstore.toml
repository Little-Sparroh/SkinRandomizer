[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "SkinRandomizer"
description = "Randomly equips your favorited character, drop pod, and weapon skins (including gun crabs and constellations) when a mission starts."
websiteUrl = ""
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/SkinRandomizer.dll"
target = "BepInEx/plugins/SkinRandomizer.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
